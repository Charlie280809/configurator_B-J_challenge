<!doctype html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ben & Jerry's Ice Cream Configurator</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
    <div id="preloader" aria-live="polite" aria-busy="true">
        <p>Bezig met laden...</p>
    </div>

    <main class="experience">
        <section class="hero">
            <img src="./src/assets/Ben_&_Jerry's.svg.webp" alt="Logo">
            <h1>Stel jouw eigen ijscup samen!</h1>
        </section>

        <section class="workspace">
            <div class="viewer">
                <div id="app" aria-label="3D preview van het ijsje"></div>
            </div>

            <div class="panel">
                <form id="order-form" action="/order.html" method="get">
                    <fieldset>
                        <label for="flavorSelect">Smaak</label>
                        <select id="flavorSelect" name="flavor" required>
                            <option value="">Kies een smaak</option>
                            <option value="vanille">Vanille</option>
                            <option value="chocolate">Chocolate Fudge Brownie</option>
                            <option value="strawberry">Strawberry Cheesecake</option>
                            <option value="cookie-dough">Cookie Dough</option>
                        </select>

                        <label for="toppingsSelect">Toppings</label>
                        <select id="toppingsSelect" name="toppings">
                            <option value="">Geen toppings</option>
                            <option value="choc-chips">Choco chips</option>
                            <option value="cookie-crumble">Cookie crumble</option>
                            <option value="marshmallow">Marshmallow</option>
                            <option value="sprinkles">Sprinkles</option>
                        </select>

                        <label for="sauceSelect">Saus</label>
                        <select id="sauceSelect" name="sauce">
                            <option value="">Geen saus</option>
                            <option value="chocolate">Chocoladesaus</option>
                            <option value="caramel">Caramelsaus</option>
                            <option value="strawberry">Aardbeiensaus</option>
                            <option value="white-chocolate">Witte chocoladesaus</option>
                        </select>
                    </fieldset>

                    <section class="price-box" aria-live="polite">
                        <p>Prijs: </p> <strong id="price">€ 0,00</strong>
                    </section>
                </form>

                <div class="page-actions">
                    <button class="cta-button" type="submit" form="order-form">Verder naar bestelling</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
